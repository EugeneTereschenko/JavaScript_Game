<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <canvas id="canvas1"></canvas>

    <img id="player" src="player.png" alt="Player Image">
    <img id="layer1" src="layer-1.png">
    <img id="layer2" src="layer-2.png">
    <img id="layer3" src="layer-3.png">
    <img id="layer4" src="layer-4.png">
    <img id="layer5" src="layer-5.png">


    <img id="layer1Forest" src="layer-1_forest.png">
    <img id="layer2Forest" src="layer-2_forest.png">

    <img id="layer4Forest" src="layer-4_forest.png">
    <img id="layer5Forest" src="layer-5_forest.png">

    <img id="enemyFlying" src="enemy_fly.png" alt="Enemy Image">
    <img id="enemyPlant" src="enemy_plant.png" alt="Enemy Image">
    <img id="enemySpider" src="enemy_spider_big.png" alt="Enemy Image">

    <img id="enemySpinner" src="enemy_spinner.png">

    <img id="enemyWorm" src="enemy_worm.png">
    <img id="enemyZombie" src="enemy_zombie.png">


    <img id="lives" src="lives.png">
    <img id="heart" src="heart.png">





    <img id="fire" src="fire.png" alt="Fire Image">

    <script type="module" src="main.js"></script>
